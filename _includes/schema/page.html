<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": "{{ page.url | prepend: site.url }}#webpage",
      "url": "{{ page.url | prepend: site.url }}",
      "name": "{{ page.title | escape }}",
      "isPartOf": { "@id": "https://joshre.com/#website" },
      "author": { "@id": "https://joshre.com/#me" }{% if page.excerpt %},
      "description": "{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}"{% endif %}
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ page.url | prepend: site.url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://joshre.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title | escape }}",
          "item": "{{ page.url | prepend: site.url }}"
        }
      ]
    }
  ]
}
</script>
